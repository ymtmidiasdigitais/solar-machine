name: Daily Instagram Post

on:
  schedule:
    # Runs every day at 11:00 AM Brazil time (BRT = UTC-3 → 14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit state.json back to repo

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Refresh Instagram token (weekly, every Sunday)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' && contains('0', format('{0}', github.run_number)) || (contains(github.event.schedule, '0 14') && (github.run_attempt == 1))
        env:
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Refresh token every Sunday (day of week = 0)
          DAY=$(date +%u)
          if [ "$DAY" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Refreshing token (Sunday or manual trigger)..."
            python refresh_token.py
          else
            echo "Not Sunday — skipping token refresh (day=$DAY)"
          fi

      - name: Publish next post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python publisher.py

      - name: Commit updated state
        run: |
          git config user.name "solar-publisher[bot]"
          git config user.email "bot@solarmachine.com.br"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update publish state [skip ci]"
          git push
